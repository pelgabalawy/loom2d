name: Tests

# Runs the full unit-test suite (C++ GoogleTest via CTest + Python pytest),
# headless, on Linux and Windows. This is the merge gate: it must pass before a
# PR can land on main, so "reviewed + merged" also means "validated".
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save runner time.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 (not windows-latest): the latest image is windows-2025
        # shipping Visual Studio 2026, but build.ps1 hard-codes the
        # "Visual Studio 17 2022" generator. Pinning keeps that generator valid.
        # TODO: make build.ps1 generator-agnostic, then move to windows-latest.
        os: [ubuntu-latest, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # SDL3 builds from source (FetchContent) and needs X11 / GL / audio dev
      # headers on Linux. Same set the release wheels install in the manylinux
      # container, translated to apt package names.
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libx11-dev libxext-dev libxcursor-dev libxi-dev \
            libxrandr-dev libxfixes-dev libxss-dev \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev \
            libwayland-dev libasound2-dev libpulse-dev

      - name: Install Python test deps
        run: python -m pip install --upgrade pip pytest

      # Build with LOOM2D_BUILD_TESTS=ON and stage the native module into
      # python/loom2d/ (the helper scripts do both), then run ctest + pytest
      # headless (SDL offscreen video + dummy audio — set inside run_tests.*).
      - name: Build & test (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x build.sh run_tests.sh
          ./build.sh Release
          ./run_tests.sh

      - name: Build & test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./build.ps1 Release
          ./run_tests.ps1
