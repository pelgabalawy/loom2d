name: Build & Release Wheels

# Build self-contained wheels for Windows / macOS / Linux (CPython 3.11–3.13).
# - Run manually (workflow_dispatch) to validate the pipeline.
# - Push a tag like v0.1.0 to build everything and publish a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]
  # Validate the wheels on PRs that touch packaging (so we catch macOS/Linux
  # build breaks before merging, without running the matrix on every code change).
  pull_request:
    paths:
      - "pyproject.toml"
      - "CMakeLists.txt"
      - ".github/workflows/release.yml"

jobs:
  build_wheels:
    name: Wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # windows x64 · macOS arm64 (Apple Silicon) · linux x86_64.
        # Intel-Mac (macos-13) is omitted for now — that runner is scarce and was
        # the CI bottleneck; revisit later as a universal2 build on the arm64 runner.
        os: [windows-latest, macos-14, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-win32 *_i686 *-musllinux*"
          CIBW_ARCHS_MACOS: "auto"   # macos-14 -> arm64, macos-13 -> x86_64

          # SDL3 needs X11/GL/audio dev headers to build inside the manylinux
          # container. SDL dlopens most backends at runtime, so the resulting
          # wheel stays portable.
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y
            libX11-devel libXext-devel libXcursor-devel libXi-devel
            libXrandr-devel libXfixes-devel libXScrnSaver-devel
            mesa-libGL-devel mesa-libEGL-devel libxkbcommon-devel
            wayland-devel alsa-lib-devel pulseaudio-libs-devel || true

          # We bundle the SDL shared library ourselves (installed next to the
          # native module, found via its $ORIGIN / @loader_path rpath), so the
          # wheel is already self-contained — skip auditwheel/delocate/delvewheel.
          CIBW_REPAIR_WHEEL_COMMAND: ""

          # Smoke test each built wheel: importing loom2d loads the native module,
          # which dynamically links the bundled SDL — proving the bundle works —
          # then exercise GPU-free tilemap logic. (No display in CI, so we don't
          # open a window.)
          CIBW_ENVIRONMENT: "SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy"
          CIBW_TEST_COMMAND: >
            python -c "import loom2d as l;
            m=l.Tilemap(32,32,10,10); m.set_solid(3,3,True);
            assert m.rect_overlaps_solid(l.Rect(100,100,8,8));
            assert not m.rect_overlaps_solid(l.Rect(0,0,8,8));
            print('loom2d wheel OK:', l.__file__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  make_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs: [build_wheels, make_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write   # required to create the release + upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
